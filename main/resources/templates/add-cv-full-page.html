<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Insert CV Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Insert CV Profile</h1>

    <form th:action="@{/cvbuildercrud/add}" th:object="${cvform}" method="post">
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" th:field="*{firstName}" required>
        </div>

        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" th:field="*{lastName}" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label>Summary:</label>
            <textarea th:field="*{summaryDescription}" rows="4"></textarea>
        </div>

        <h3>Education</h3>
        <div class="form-group">
            <label>Institution:</label>
            <input type="text" th:field="*{educationInstitution}">
        </div>
        <div class="form-group">
            <label>Degree:</label>
            <input type="text" th:field="*{educationDegree}">
        </div>

        <h3>Experience</h3>
        <div class="form-group">
            <label>Company:</label>
            <input type="text" th:field="*{experienceCompany}">
        </div>
        <div class="form-group">
            <label>Job Title:</label>
            <input type="text" th:field="*{experienceJobTitle}">
        </div>
        <div class="form-group">
            <label>Description:</label>
            <textarea th:field="*{experienceDescription}" rows="4"></textarea>
        </div>

        <h3>Skills</h3>
        <div class="form-group">
            <label>Skill:</label>
            <select th:field="*{skillId}">
                <option value="">Select skill</option>
                <option th:each="skill : ${skills}"
                        th:value="${skill.id}"
                        th:text="${skill.name}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Proficiency Level:</label>
            <select th:field="*{proficiencyLevel}">
                <option value="">Select level</option>
                <option th:each="level : ${levels}"
                        th:value="${level}"
                        th:text="${level}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Insert Profile</button>
        <a th:href="@{/cvbuildercrud/all}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
