<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All CV Profiles</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a73e8; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-update { background-color: #f4b400; margin-right: 5px; }
        .btn-delete { background-color: #d93025; }
        .btn-back { background-color: #5f6368; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Registered CV Profiles</h1>
    <hr>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cv : ${cvList}">
                <td th:text="${cv.idcp}">1</td>
                <td th:text="${cv.firstName}">First</td>
                <td th:text="${cv.lastName}">Last</td>
                <td th:text="${cv.email}">email@domain.com</td>
                <td>
                    <a th:href="@{/cv/update/{id}(id=${cv.idcp})}" class="btn btn-update">Edit</a>
                    <a th:href="@{/cv/delete/{id}(id=${cv.idcp})}" class="btn btn-delete" 
                       onclick="return confirm('Are you sure you want to delete this CV profile?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <a th:href="@{/}" class="btn btn-back">⬅ Back to Dashboard</a>
</body>
</html>
